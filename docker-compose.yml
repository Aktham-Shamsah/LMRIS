services:
  mongo:
    image: mongo:7
    container_name: lrmis-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  backend:
    image: python:3.12-slim
    container_name: lrmis-backend
    working_dir: /app
    volumes:
      - ./backend:/app
    environment:
      MONGODB_URI: mongodb://mongo:27017
      MONGODB_DB: lrmis
      CORS_ORIGINS: http://localhost:5173,http://127.0.0.1:5173
    command: sh -c "pip install --no-cache-dir -r requirements.txt && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    ports:
      - "8000:8000"
    depends_on:
      - mongo

  frontend:
    image: node:22-alpine
    container_name: lrmis-frontend
    working_dir: /app
    volumes:
      - ./frontend:/app
    environment:
      VITE_API_BASE_URL: http://localhost:8000
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  mongo-data:

